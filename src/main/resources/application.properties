spring.application.name=orchestra

server.port=8181

management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# AI Model Configuration
spring.ai.chat.client.enabled=false

    # OpenAI (used for Groq fallback — keep unchanged)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.max-tokens=12000

    # OpenRouter
orchestra.openrouter.api-key=${OPENROUTER_API_KEY}
orchestra.openrouter.base-url=https://openrouter.ai/api
orchestra.openrouter.model=qwen/qwen3-coder-next

## Default agent provider (groq | ollama | open-router)
orchestra.agent.default-provider=open-router

    # Ollama
spring.ai.ollama.embedding.model=nomic-embed-text:latest
spring.ai.ollama.chat.model=qwen3:4b

## TTS Service
tts.service.base-url=http://localhost:8002
tts.service.voice-sample-path=models/user_voice_sample.wav
tts.service.language=ru

## OpenAI Realtime voice mode
orchestra.openai.realtime.api-key=${OPENAI_API_KEY:}
orchestra.openai.realtime.base-url=${OPENAI_REALTIME_BASE_URL:https://api.openai.com}
orchestra.openai.realtime.model=${OPENAI_REALTIME_MODEL:gpt-realtime}
orchestra.openai.realtime.voice=${OPENAI_REALTIME_VOICE:marin}
orchestra.openai.realtime.noise-reduction=${OPENAI_REALTIME_NOISE_REDUCTION:near_field}
orchestra.openai.realtime.turn-detection-type=${OPENAI_REALTIME_TURN_DETECTION:server_vad}

server.netty.idle-timeout=300
server.netty.connection-timeout=120

# JDBC Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.ai.chat.memory.repository.jdbc.initialize-schema=always


spring.ai.chat.memory.max-messages=15

# Redis Vector Store Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.ai.vectorstore.redis.index-name=enu_redis_documents
spring.ai.vectorstore.redis.prefix=document_embeddings:
spring.data.redis.password=${REDIS_PASSWORD:}
spring.ai.vectorstore.redis.initialize-schema=true

# R2DBC Configuration
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/postgres
spring.r2dbc.username=${POSTGRES_USER:postgres}
spring.r2dbc.password=${POSTGRES_PASSWORD:postgres}


audio.playback.mixer-name=CABLE Input (VB-Audio Virtual Cable)

## ENU API Configuration
enu.portal.base-url=https://portal.enu.kz
platonus.api.base-url=https://edu.enu.kz


enu.api.username=${ENU_API_USERNAME:demo_user}
enu.api.password=${ENU_API_PASSWORD:demo_pass}

academic.year.start.month=9

# ???? ??? 1-?? ????????
academic.semester1.start.month=9
academic.semester1.start.day=2
academic.semester1.finish.month=12
academic.semester1.finish.day=15

# ???? ??? 2-?? ????????
academic.semester2.start.month=1
academic.semester2.start.day=13
academic.semester2.finish.month=4
academic.semester2.finish.day=27


## Custom output format (MARKDOWN or JSON)
orchestra.output.format=JSON

## Logging / Observability additions
management.endpoints.web.exposure.include=health,metrics,prometheus
management.prometheus.metrics.export.enabled=true

# Document Processing
document.processing.enabled=true
document.processing.preload=true
document.processing.directory=documents

